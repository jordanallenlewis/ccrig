# CI: syntax-check, edge-case render, and run the full test suite (unit + regression + quality gates)
# across every supported Node version, as a non-root user so the read-only-settings regression runs.
stages: [test]

test:
  stage: test
  image: node:${NODE_VERSION}
  parallel:
    matrix:
      # README promises Node 18+, so enforce it here (the suite passes on 18.15.0).
      - NODE_VERSION: ["18", "20", "22"]
  script:
    - node --check statusline.js
    - node --check test.js
    - node --check test-unit.js
    - node --check test-gates.js
    - node statusline.js --selftest
    # Run the suite as the image's non-root `node` user, so the read-only settings.json regression
    # (which self-skips under uid 0) actually executes. node --test auto-discovers test.js +
    # test-unit.js + test-gates.js. If a runner's permissions fight `su node`, drop these two lines
    # back to a plain `node --test` (the read-only test then self-skips, as it did before).
    - chown -R node .
    - su node -c 'node --test'

shellcheck:
  stage: test
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck claude-profiles.sh install.sh
