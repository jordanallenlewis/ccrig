# CI: syntax-check, edge-case render, and run the full test suite (unit + regression).
stages: [test]

test:
  stage: test
  image: node:22
  script:
    - node --check statusline.js
    - node --check test.js
    - node --check test-unit.js
    - node statusline.js --selftest
    - node --test          # auto-discovers test.js (regression/integration) + test-unit.js (unit)

shellcheck:
  stage: test
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck claude-profiles.sh install.sh
  allow_failure: true
